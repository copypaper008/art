<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recognition Engine — Poster</title>

  <!-- Typography: condensed grotesque + mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <div id="controls">
    <select id="subject-select" aria-label="Subject">
      <option value="warhol">WARHOL, ANDY</option>
      <option value="haring">HARING, KEITH</option>
    </select>

    <button id="rescan-btn" title="Generate a new random determination">RESCAN</button>
    <button id="scan-btn"   title="Capture your face and superimpose it">SCAN FACE</button>
    <button id="export-btn" title="Download poster as PNG">EXPORT PNG</button>
    <button id="anchor-btn" title="Open the dev anchor editor">ANCHORS</button>

    <span id="status"></span>
  </div>

  <div id="canvas-wrapper">
    <canvas id="poster-canvas"></canvas>
  </div>

  <!-- Off-screen utilities for face-swap pipeline -->
  <video  id="webcam"      autoplay playsinline muted></video>
  <canvas id="work-canvas"></canvas>

</div>

<!-- Types (JSDoc only, no runtime code) -->
<script src="types.js"></script>

<!-- Subject configs -->
<script src="subjects/warhol.js"></script>
<script src="subjects/haring.js"></script>

<!-- Core modules -->
<script src="determination.js"></script>
<script src="renderer.js"></script>
<script src="face-swap.js"></script>
<script src="anchor-overlay.js"></script>

<script>
'use strict';

// ── Subject registry ──────────────────────────────────────────────────
const SUBJECTS = {
  warhol: WARHOL_CONFIG,
  haring: HARING_CONFIG,
};

// ── State ─────────────────────────────────────────────────────────────
let activeSubject      = 'warhol';
let activeDetermination = null;
let activePortrait     = null;  // null = use config.portrait; else composited canvas

const posterCanvas  = document.getElementById('poster-canvas');
const workCanvas    = document.getElementById('work-canvas');
const webcamEl      = document.getElementById('webcam');
const statusEl      = document.getElementById('status');

function setStatus(msg) { statusEl.textContent = msg; }

// ── Render ────────────────────────────────────────────────────────────
// regen=true  → fresh random determination (default for user-initiated actions)
// regen=false → reuse activeDetermination (used when only swapping the portrait)
async function render(portrait = null, regen = true) {
  activePortrait = portrait;
  if (regen || !activeDetermination) activeDetermination = generateDetermination();
  const config = SUBJECTS[activeSubject];
  setStatus('rendering…');
  try {
    await renderPoster(posterCanvas, config, activeDetermination, portrait);
    setStatus('');
  } catch (e) {
    setStatus(`render error: ${e.message}`);
    console.error(e);
  }
}

// ── Subject switcher ──────────────────────────────────────────────────
document.getElementById('subject-select').addEventListener('change', async e => {
  activeSubject = e.target.value;
  await render(null, true);   // clear any composited face when switching subjects
});

// ── Rescan (new random determination, keep composited face if any) ────
document.getElementById('rescan-btn').addEventListener('click', () => render(activePortrait, true));

// ── Scan face ─────────────────────────────────────────────────────────
document.getElementById('scan-btn').addEventListener('click', async () => {
  const btn = document.getElementById('scan-btn');
  btn.disabled = true;
  setStatus('requesting camera…');

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
    webcamEl.srcObject = stream;
    await new Promise((res, rej) => {
      webcamEl.onloadeddata = res;
      setTimeout(() => rej(new Error('camera timeout')), 8000);
    });

    setStatus('capturing…');
    await new Promise(r => setTimeout(r, 400)); // let auto-exposure settle

    workCanvas.width  = webcamEl.videoWidth;
    workCanvas.height = webcamEl.videoHeight;
    workCanvas.getContext('2d').drawImage(webcamEl, 0, 0);

    setStatus('detecting face…');
    const config = SUBJECTS[activeSubject];
    const composited = await swapFace(workCanvas, config);

    setStatus('rendering…');
    await render(composited);
    setStatus('done');
  } catch (err) {
    if (err.message === 'NO_FACE_DETECTED') {
      setStatus('no face detected — try again with better lighting');
    } else {
      setStatus(`error: ${err.message}`);
      console.error(err);
    }
  } finally {
    if (stream) stream.getTracks().forEach(t => t.stop());
    webcamEl.srcObject = null;
    btn.disabled = false;
  }
});

// ── Export ────────────────────────────────────────────────────────────
document.getElementById('export-btn').addEventListener('click', () => {
  const link = document.createElement('a');
  const name  = activeSubject.toUpperCase();
  link.download = `recognition-engine-${name}-${Date.now()}.png`;
  link.href = posterCanvas.toDataURL('image/png');
  link.click();
});

// ── Anchor dev tool ───────────────────────────────────────────────────
document.getElementById('anchor-btn').addEventListener('click', () => {
  showAnchorOverlay(SUBJECTS[activeSubject]);
});

// ── Kiosk mode — live webcam tracking via postMessage ───────────────────────
if (new URLSearchParams(location.search).has('kiosk')) {
  document.body.classList.add('kiosk');

  let _liveFL       = null;   // FaceLandmarker VIDEO mode
  let _liveBusy     = false;  // frame-processing lock (drop frames while busy)
  let _lastLiveTs   = 0;      // monotonic timestamp for detectForVideo
  let _maskCache    = null;   // pre-computed feathered oval mask canvas
  let _portCache    = null;   // loaded portrait image/canvas
  let _portLayout   = null;   // { dx, dy, dw, dh, iw, ih } in poster-canvas space
  let _staticCanvas = null;   // full poster rendered without live face (updated once on init)

  // ── VIDEO-mode FaceLandmarker (supports up to 6 simultaneous faces) ────────
  async function _getLiveFL() {
    if (_liveFL) return _liveFL;
    const CDN = 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14';
    const { FaceLandmarker: FL, FilesetResolver: FR } =
      await import(CDN + '/vision_bundle.mjs')
        .catch(() => import('./vendor/mediapipe/vision_bundle.mjs'));
    const wasm = await FR.forVisionTasks(CDN + '/wasm')
      .catch(() => FR.forVisionTasks('./vendor/mediapipe'));
    _liveFL = await FL.createFromOptions(wasm, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
      },
      runningMode: 'VIDEO',
      numFaces: 6,
      outputFaceBlendshapes: false,
      outputFacialTransformationMatrixes: false,
    });
    return _liveFL;
  }

  // ── Render static poster chrome; cache portrait image and layout ─────────
  async function _initPoster() {
    _maskCache = null; _portCache = null; _portLayout = null;

    if (!activeDetermination) activeDetermination = generateDetermination();
    const config = SUBJECTS[activeSubject];

    // Render full poster to off-screen canvas (uses placeholder portrait)
    _staticCanvas = document.createElement('canvas');
    await renderPoster(_staticCanvas, config, activeDetermination, null);

    // Blit to display canvas
    posterCanvas.width  = _staticCanvas.width;
    posterCanvas.height = _staticCanvas.height;
    posterCanvas.getContext('2d').drawImage(_staticCanvas, 0, 0);

    // Load portrait image (falls back to grey placeholder if file is missing)
    _portCache = await loadImage(config.portrait);

    // Compute the portrait's position in poster-canvas space
    // (mirrors the layout logic in renderer.js drawPortrait)
    const PAD_L = 46, PAD_T = 14, PAD_B = 88;
    const px  = PAD_L;
    const py  = BODY_Y + PAD_T;
    const pw  = LEFT_W - PAD_L - 4;
    const ph  = BODY_H - PAD_T - PAD_B;
    const iw  = _portCache.naturalWidth  || _portCache.width  || 684;
    const ih  = _portCache.naturalHeight || _portCache.height || 816;
    const sc  = Math.min(pw / iw, ph / ih);
    const dw  = iw * sc, dh = ih * sc;
    const dx  = px + (pw - dw) / 2, dy = py;
    _portLayout = { dx, dy, dw, dh, iw, ih };

    // Pre-compute feathered oval mask at native portrait resolution
    _maskCache = createFaceMask(iw, ih, config.faceAnchors.faceOval);

    setStatus('');
  }

  // ── Redraw frame + brackets + crosshairs on top of live-face composite ────
  function _redrawDecorations(ctx, dx, dy, dw, dh) {
    ctx.save();
    orect(ctx, dx, dy, dw, dh, 1);
    const bm = 8;
    drawBracket(ctx, dx + bm,      dy + bm,      'tl');
    drawBracket(ctx, dx + dw - bm, dy + bm,      'tr');
    drawBracket(ctx, dx + bm,      dy + dh - bm, 'bl');
    drawBracket(ctx, dx + dw - bm, dy + dh - bm, 'br');
    const ccx = dx + dw / 2, ccy = dy + dh * 0.44;
    ctx.globalAlpha = 0.55;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth   = 0.7;
    ctx.setLineDash([5, 7]);
    ctx.beginPath();
    ctx.moveTo(dx, ccy); ctx.lineTo(dx + dw, ccy);
    ctx.moveTo(ccx, dy); ctx.lineTo(ccx, dy + dh);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  // ── Process one incoming webcam frame ─────────────────────────────────────
  async function _processFrame(dataUrl, faceHint) {
    if (_liveBusy || !_portLayout) return;
    _liveBusy = true;
    try {
      const lfl = await _getLiveFL();

      // Decode JPEG into a canvas suitable for detectForVideo
      const img = new Image();
      await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = dataUrl; });
      const srcC = document.createElement('canvas');
      srcC.width = img.width; srcC.height = img.height;
      srcC.getContext('2d').drawImage(img, 0, 0);

      // detectForVideo requires monotonically increasing timestamps
      const ts = Math.max(performance.now(), _lastLiveTs + 1);
      _lastLiveTs = ts;
      const result = lfl.detectForVideo(srcC, ts);
      if (!result.faceLandmarks?.length) return;

      // When multiple faces detected, pick the one nearest to faceHint
      // (faceHint is in raw webcam pixel coords — unmirrored)
      const I468 = 468, I473 = 473;   // iris centre landmark indices
      let best = 0;
      if (faceHint && result.faceLandmarks.length > 1) {
        let minD = Infinity;
        result.faceLandmarks.forEach((lm, i) => {
          const fx = ((lm[I468].x + lm[I473].x) * 0.5) * srcC.width;
          const fy = ((lm[I468].y + lm[I473].y) * 0.5) * srcC.height;
          const d  = (fx - faceHint.x) ** 2 + (fy - faceHint.y) ** 2;
          if (d < minD) { minD = d; best = i; }
        });
      }

      // Mirror x so eye coords match the visually-mirrored display
      const lm   = result.faceLandmarks[best];
      const srcL = { x: (1 - lm[I468].x) * srcC.width,  y: lm[I468].y * srcC.height };
      const srcR = { x: (1 - lm[I473].x) * srcC.width,  y: lm[I473].y * srcC.height };

      const config = SUBJECTS[activeSubject];
      const T = computeSimilarityTransform(
        srcL, srcR, config.faceAnchors.leftEye, config.faceAnchors.rightEye
      );

      const { iw, ih, dx, dy, dw, dh } = _portLayout;

      // Warp webcam face into portrait space
      const warpC = document.createElement('canvas');
      warpC.width = iw; warpC.height = ih;
      const wCtx  = warpC.getContext('2d');
      wCtx.save();
      wCtx.translate(T.tx, T.ty);
      wCtx.rotate(T.rotation);
      wCtx.scale(T.scale, T.scale);
      wCtx.drawImage(srcC, -T.srcMidX, -T.srcMidY);
      wCtx.restore();

      toGreyscale(warpC);
      addGrain(warpC, 12);

      // Clip warped face through the feathered oval mask
      const maskedC = document.createElement('canvas');
      maskedC.width = iw; maskedC.height = ih;
      const mCtx   = maskedC.getContext('2d');
      mCtx.drawImage(warpC, 0, 0);
      mCtx.globalCompositeOperation = 'destination-in';
      mCtx.drawImage(_maskCache, 0, 0);
      mCtx.globalCompositeOperation = 'source-over';

      // Composite onto poster: restore static region → portrait → live face → decorations
      const ctx = posterCanvas.getContext('2d');
      ctx.drawImage(_staticCanvas, dx, dy, dw, dh, dx, dy, dw, dh);
      ctx.drawImage(_portCache, dx, dy, dw, dh);
      ctx.drawImage(maskedC, 0, 0, iw, ih, dx, dy, dw, dh);
      _redrawDecorations(ctx, dx, dy, dw, dh);

    } catch (e) {
      console.warn('[kiosk] frame error:', e.message);
    } finally {
      _liveBusy = false;
    }
  }

  // ── Message listener ─────────────────────────────────────────────────────
  window.addEventListener('message', async evt => {
    const msg = evt.data;
    if (!msg || typeof msg !== 'object') return;
    if (msg.type === 'KIOSK_INIT') {
      activeSubject       = msg.subjectKey || 'warhol';
      activeDetermination = null;
      setStatus('initialising…');
      await _initPoster();
    } else if (msg.type === 'WEBCAM_FRAME') {
      _processFrame(msg.dataUrl, msg.faceHint);  // not awaited — drops if busy
    }
  });

  // Initial render while awaiting KIOSK_INIT from parent
  setStatus('initialising…');
  _initPoster();

} else {
  // ── Normal (non-kiosk) init ─────────────────────────────────────────
  render(null, true);
}
</script>
</body>
</html>
