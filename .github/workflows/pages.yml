name: Deploy Recognition Engine to GitHub Pages

on:
  push:
    branches: [main, claude/recognition-engine-artwork-fempzf]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          # Serve the imported poster design as the site root.
          # The legacy p5.js app still lives in recognition-engine/ if needed.
          path: recognition-engine-poster/

      - id: deploy
        uses: actions/deploy-pages@v4
